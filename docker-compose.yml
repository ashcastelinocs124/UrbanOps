services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  simulator:
    build:
      context: ./services
      dockerfile: simulator/Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/simulator:/app
      - ./services/shared:/app/shared

  processor:
    build:
      context: ./services
      dockerfile: processor/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/processor:/app
      - ./services/shared:/app/shared

  analyst:
    build:
      context: ./services
      dockerfile: analyst/Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/analyst:/app
      - ./services/shared:/app/shared

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - processor
    volumes:
      - ./frontend:/app
      - /app/node_modules
